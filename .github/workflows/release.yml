name: "Release"

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # --- 新增步骤：动态同步版本号 ---
      - name: Sync version from tag
        run: |
          # 1. 获取标签名 (例如 v0.1.1)
          TAG=${GITHUB_REF_NAME}
          # 2. 去掉前缀 'v' (变为 0.1.1)
          VERSION=${TAG#v}
          echo "Updating version to $VERSION"

          # 3. 修改 tauri.conf.json 中的 version 字段
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json

          # 4. 修改 Cargo.toml 中的 version 字段 (匹配行首的 version = "...")
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

          # 验证修改结果
          echo "Verified tauri.conf.json:"
          grep '"version"' src-tauri/tauri.conf.json
          echo "Verified Cargo.toml:"
          grep '^version =' src-tauri/Cargo.toml
      # ----------------------------

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev flatpak-builder xdg-utils
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.gnome.Platform//45 org.gnome.Sdk//45

      - name: install frontend dependencies
        run: npm install

      - name: build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ github.ref_name }}
          releaseName: "App Release ${{ github.ref_name }}"

      - name: build flatpak bundle (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          # 动态提取版本号，去掉前缀 'v'
          VERSION=${GITHUB_REF_NAME#v}
          echo "Building Flatpak version $VERSION"
          npm run tauri build
          flatpak-builder build-dir com.cqhqp.hello-tauri.json
          flatpak-builder --bundle-version=$VERSION --bundle-id=com.cqhqp.hello-tauri --bundle-version-git hello-tauri.flatpak build-dir

      - name: upload flatpak artifact (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v1
        with:
          files: hello-tauri.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

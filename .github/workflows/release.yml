name: "Release"
on:
  push:
    tags:
      - "v*"
jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      # Node 安装完后再同步版本号
      - name: Sync version from tag
        run: |
          node scripts/sync-version.cjs ${{ github.ref_name }}
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev flatpak-builder xdg-utils
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.gnome.Platform//45 org.gnome.Sdk//45
      - name: install frontend dependencies
        run: npm install
      - name: build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "App Release ${{ github.ref_name }}"
      - name: build flatpak bundle (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Building Flatpak version $VERSION"
          flatpak-builder --repo=repo-dir --force-clean build-dir com.cqhqp.hello-tauri.json
          flatpak build-bundle repo-dir hello-tauri.flatpak com.cqhqp.hello-tauri
      - name: upload flatpak artifact (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v1
        with:
          files: hello-tauri.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  release-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - name: Sync version from tag
        run: |
          node scripts/sync-version.cjs ${{ github.ref_name }}
      - name: install frontend dependencies
        run: npm install
      - name: setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ndk;27.0.12077973 platform-tools platforms;android-34 build-tools;34.0.0
      - name: init Android project
        run: |
          export NDK_HOME="$ANDROID_HOME/ndk/27.0.12077973"
          npx tauri android init
      - name: build Android APK
        run: |
          export NDK_HOME="$ANDROID_HOME/ndk/27.0.12077973"
          npx tauri android build
      - name: locate APK
        run: |
          find src-tauri/gen/android -name "*.apk" -type f
      - name: upload Android APK
        uses: softprops/action-gh-release@v1
        with:
          files: src-tauri/gen/android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

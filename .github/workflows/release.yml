name: "Release"

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # --- 新增步骤：动态同步版本号 ---
      - name: Sync version from tag
        run: |
          node scripts/sync-version.cjs ${{ github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev flatpak-builder xdg-utils
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.gnome.Platform//45 org.gnome.Sdk//45

      - name: install frontend dependencies
        run: npm install

      - name: build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ github.ref_name }}
          releaseName: "App Release ${{ github.ref_name }}"

      - name: build flatpak bundle (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Building Flatpak version $VERSION"

          # 1. 编译 Tauri 二进制文件
          npm run tauri build

          # 2. 构建 Flatpak 目录 (使用 flatpak-builder)
          flatpak-builder build-dir com.cqhqp.hello-tauri.json

          # 3. 将构建目录打包成 .flatpak 文件 (使用 flatpak build-bundle)
          # 语法: flatpak build-bundle [文件名] [应用ID] [构建目录]
          flatpak build-bundle hello-tauri.flatpak com.cqhqp.hello-tauri build-dir

      - name: upload flatpak artifact (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v1
        with:
          files: hello-tauri.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
